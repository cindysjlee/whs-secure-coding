<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}My Market{% endblock %}</title>
  <link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/style.css') }}"
  >
  <script
    src="{{ url_for('static', filename='js/socket.io.min.js') }}"
    defer
  ></script>
</head>
<body>
  <nav>
    {% if session.get('user_id') %}
      <a href="{{ url_for('dashboard') }}">대시보드</a>
      <a href="{{ url_for('profile') }}">프로필</a>
      <a href="{{ url_for('transfer') }}">송금</a>
      <a href="{{ url_for('report') }}">신고하기</a>
      <form method="post"
            action="{{ url_for('logout') }}"
            class="logout-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit">로그아웃</button>
      </form>
    {% else %}
      <a href="{{ url_for('login') }}">로그인</a>
      <a href="{{ url_for('register') }}">회원가입</a>
    {% endif %}
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li class="flash">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
