{% extends "base.html" %}

{% block title %}상품 수정{% endblock %}

{% block content %}
<h2>상품 수정</h2>

<form method="post" action="{{ url_for('edit_product', product_id=product['id']) }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label for="title">상품명</label>
  <input
    type="text"
    id="title"
    name="title"
    value="{{ product['title'] }}"
    maxlength="100"
    required
  >

  <label for="description">상품 설명</label>
  <textarea
    id="description"
    name="description"
    maxlength="2000"
    rows="6"
    required
  >{{ product['description'] }}</textarea>

  <label for="price">가격</label>
  <input
    type="number"
    id="price"
    name="price"
    value="{{ product['price'] }}"
    min="0"
    max="100000000"
    step="1"
    required
  >

  <button type="submit">수정 저장</button>
</form>
{% endblock %}
