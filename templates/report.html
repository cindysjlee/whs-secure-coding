{% extends "base.html" %}

{% block title %}신고하기{% endblock %}

{% block content %}
<h2>신고하기</h2>

<form method="post" action="{{ url_for('report') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label for="target_type">신고 유형</label>
  <select id="target_type" name="target_type" required>
    <option value="">신고 유형을 선택하세요</option>
    <option value="user">사용자 신고</option>
    <option value="product">상품 신고</option>
  </select>

  <div id="user_target" class="hidden">
    <label for="user_id">신고할 사용자</label>
    <select id="user_id">
      <option value="">사용자를 선택하세요</option>

      {% for target_user in users %}
        <option value="{{ target_user['id'] }}">
          {{ target_user['username'] }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div id="product_target" class="hidden">
    <label for="product_id">신고할 상품</label>
    <select id="product_id">
      <option value="">상품을 선택하세요</option>

      {% for product in products %}
        <option value="{{ product['id'] }}">
          {{ product['title'] }}
        </option>
      {% endfor %}
    </select>
  </div>

  <input type="hidden" id="target_id" name="target_id">

  <label for="reason">신고 사유</label>
  <textarea
    id="reason"
    name="reason"
    maxlength="500"
    rows="5"
    required
  ></textarea>

  <button type="submit">신고하기</button>
</form>
<script src="{{ url_for('static', filename='js/report.js') }}" defer></script>
{% endblock %}
